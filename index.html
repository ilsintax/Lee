<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인화 사이트 메인</title>
  <style>
    :root {
      --bg-start: #f4f7fb;
      --bg-end: #e7eef8;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-border: rgba(24, 61, 104, 0.12);
      --text-main: #183d68;
      --text-sub: #5d6f85;
      --accent: #2f7cf6;
      --accent-strong: #165ed1;
      --shadow: 0 18px 40px rgba(27, 57, 96, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(47, 124, 246, 0.12), transparent 28%),
        linear-gradient(180deg, var(--bg-start), var(--bg-end));
      color: var(--text-main);
    }

    .page {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    .hero {
      margin-bottom: 32px;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 4vw, 46px);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 680px;
      color: var(--text-sub);
      font-size: 17px;
      line-height: 1.7;
    }

    .company-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .company-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .company-name {
      margin: 0 0 18px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(47, 124, 246, 0.10), rgba(47, 124, 246, 0.02));
      border: 1px solid rgba(47, 124, 246, 0.18);
      color: var(--accent-strong);
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .task-link:hover,
    .task-link:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(47, 124, 246, 0.14);
      border-color: rgba(47, 124, 246, 0.35);
      outline: none;
    }

    .task-link span:last-child {
      font-size: 20px;
      line-height: 1;
    }

    .helper-text {
      margin-top: 28px;
      color: var(--text-sub);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1080px);
        padding-top: 40px;
        padding-bottom: 48px;
      }

      .company-card {
        padding: 22px;
        border-radius: 20px;
      }

      .task-link {
        padding: 15px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>개인화 사이트 메인</h1>
      <p>업체별 작업을 한눈에 보고 바로 이동할 수 있도록 정리한 메인 화면입니다. 추후 업체나 하부 작업이 늘어나면 아래 카드와 링크만 같은 형식으로 추가하면 됩니다.</p>
    </section>

    <section class="company-grid" aria-label="업체별 바로가기 목록">
      <article class="company-card">
        <h2 class="company-name">GLP</h2>
        <div class="task-list">
          <a class="task-link" href="https://ilsintax.github.io/Lee/GLP/payroll" target="_blank" rel="noopener noreferrer">
            <span>Payroll</span>
            <span aria-hidden="true">&rsaquo;</span>
          </a>
        </div>
      </article>
    </section>

    <p class="helper-text">관리 팁: 업체 추가 시에는 카드 단위로, 하부 작업 추가 시에는 같은 카드 안에 링크를 한 줄씩 더 넣으면 됩니다.</p>
  </main>
</body>
</html>
