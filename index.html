<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#44060;&#51064;&#54868; &#49324;&#51060;&#53944; &#47700;&#51064;</title>
  <style>
    :root {
      --bg-start: #f3f6fb;
      --bg-end: #e6edf7;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-border: rgba(24, 61, 104, 0.12);
      --text-main: #183d68;
      --text-sub: #5d6f85;
      --accent: #2f7cf6;
      --accent-strong: #165ed1;
      --accent-soft: rgba(47, 124, 246, 0.10);
      --shadow: 0 18px 40px rgba(27, 57, 96, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(47, 124, 246, 0.14), transparent 28%),
        linear-gradient(180deg, var(--bg-start), var(--bg-end));
      color: var(--text-main);
    }

    .page {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    .hero {
      margin-bottom: 36px;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 4vw, 46px);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--text-sub);
      font-size: 17px;
      line-height: 1.7;
    }

    .company-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      align-items: start;
    }

    .company-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .company-name {
      margin: 0 0 18px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent-soft), rgba(47, 124, 246, 0.02));
      border: 1px solid rgba(47, 124, 246, 0.18);
      color: var(--accent-strong);
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .task-link:hover,
    .task-link:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(47, 124, 246, 0.14);
      border-color: rgba(47, 124, 246, 0.35);
      outline: none;
    }

    .task-arrow {
      font-size: 20px;
      line-height: 1;
    }

    .helper-text {
      margin-top: 28px;
      color: var(--text-sub);
      font-size: 14px;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1280px);
        padding-top: 40px;
        padding-bottom: 48px;
      }

      .company-card {
        padding: 22px;
        border-radius: 20px;
      }

      .task-link {
        padding: 15px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>&#44060;&#51064;&#54868; &#49324;&#51060;&#53944; &#47700;&#51064;</h1>

    </section>

    <section class="company-grid" aria-label="&#50629;&#52404;&#48324; &#48148;&#47196;&#44032;&#44592; &#47785;&#47197;">
      <article class="company-card">
        <h2 class="company-name">GLP</h2>
        <div class="task-list">
          <a class="task-link" href="https://ilsintax.github.io/Lee/GLP/payroll" target="_blank" rel="noopener noreferrer">
            <span>Payroll</span>

      </article>

      <article class="company-card">

        <div class="task-list">
          <a class="task-link" href="https://ilsintax.github.io/Lee/The_moon/payroll" target="_blank" rel="noopener noreferrer">
            <span>Payroll</span>
            <span class="task-arrow" aria-hidden="true">&gt;</span>
          </a>
        </div>
      </article>
    </section>

    <p class="helper-text">&#44288;&#47532; &#54081;: &#50629;&#52404;&#44032; &#45720;&#50612;&#45208;&#47732; `company-card` &#48660;&#47197;&#51012; &#48373;&#49324;&#54644;&#49436; &#52628;&#44032;&#54616;&#44256;, &#44033; &#50629;&#52404; &#50504;&#50640;&#49436; &#51089;&#50629;&#51060; &#45720;&#50612;&#45208;&#47732; `task-link` &#54620; &#51460;&#50473; &#45908; &#45347;&#51004;&#47732; &#46121;&#45768;&#45796;.</p>
  </main>
</body>
</html>
